# CoBWeaverClaw Configuration
# ================================

agent:
  name: "كلاو"               # اسم الوكيل كما يظهر في النظام
  version: "0.1.0"
  language: "ar"             # ar | en | both
  style: "professional"      # professional | friendly | direct | formal
  specialization: "general"  # general | trading | academic | technical | business
  memory_size: 20            # عدد رسائل الذاكرة العاملة (Layer 1)
  mission_anchor: "أنت كلاو، وكيل ذكاء اصطناعي شخصي لـ Bashar Hassan."

# ── Role-based key routing ───────────────────────────────────
# يربط كل نوع مهمة بمزوّد محدّد. model_router يقرأ نوع المهمة ويختار المفتاح.
# أنواع المهام: chat | analysis | summary | search | code
keys:
  primary_chat: "deepseek"     # المحادثة العادية
  fast_tasks: "zai"            # المهام السريعة/الخفيفة (تلخيص/بحث)
  analysis: "anthropic"        # التحليل العميق والبرمجة

# ── Brain / Models ──────────────────────────────────────────
brain:
  primary: anthropic/claude-sonnet-4-6        # deep analysis
  fast: groq/llama-3.3-70b-versatile          # quick responses (150ms)
  local: ollama/mistral                       # offline fallback
  fallback_chain: [primary, fast, local]
  auto_select: true               # auto-choose model per task type

# ── Memory System ────────────────────────────────────────────
memory:
  sqlite_path: ~/.cobweaverclaw/memory.db
  lightrag_path: ~/.cobweaverclaw/lightrag/
  compression_threshold: 1000
  sync_across_devices: false

# ── Device Registry ──────────────────────────────────────────
devices:
  db_path: ~/.cobweaverclaw/devices.db
  notify_new_device: true       # إشعار فوري عند تسجيل جهاز جديد
  auto_register: true           # تسجيل الجهاز تلقائياً عند أول تشغيل

# ── Update System ────────────────────────────────────────────
updates:
  auto_check: true
  check_interval_hours: 6       # فحص كل 6 ساعات
  notify_on_update: true        # إشعار فوري عند وجود تحديث
  notify_on_commit: true        # إشعار بكل commit جديد (للمطور)
  github_repo: basharbhassan336699-cell/CoBWeaverClaw
  auto_install: false           # لا تثبّت تلقائياً — اطلب إذن المستخدم

# ── Heartbeat ────────────────────────────────────────────────
heartbeat:
  enabled: true
  interval_seconds: 300
  tasks:
    - check_updates             # فحص التحديثات
    - check_open_positions      # مراقبة الصفقات
    - monitor_alerts            # التنبيهات
    - update_memory             # تحديث الذاكرة

# ── Interfaces ───────────────────────────────────────────────
interfaces:
  telegram:
    enabled: true
    token: ""                   # BOT_TOKEN من BotFather
    owner_chat_id: ""           # chat_id الخاص بك للإشعارات
  cli:
    enabled: true
  dashboard:
    enabled: false
    port: 8080
    host: localhost

# ── Security ─────────────────────────────────────────────────
security:
  sandbox_all_plugins: true
  trust_level_default: 0
  tls_only: true
  auto_audit_interval_days: 7

# ── Self-Learning ────────────────────────────────────────────
learning:
  enabled: true
  schedule: "0 2 * * 0"
  sources:
    - web
    - youtube_transcripts
    - arxiv
  max_sources_per_run: 10

# ── Swarm Trading Engine ─────────────────────────────────────
swarm:
  enabled: false
  agents_count: 50
  simulation_timeout_seconds: 30
