<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoBWeaverClaw — بوابة التحكم</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  :root{--bg:#0F0F1A;--card:#1A1A2E;--accent:#16213E;--gold:#E2B04A;--border:#2A2A4A;--text:#E8E8F0;--sub:#8888AA;--green:#27AE60;--red:#E74C3C}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  #login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:20px}
  #login .spider{font-size:3rem}
  #login h1{color:var(--gold);font-size:1.6rem;letter-spacing:1px}
  #login p{color:var(--sub);font-size:.9rem;text-align:center}
  .login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:420px;text-align:center}
  .login-box label{display:block;font-size:.85rem;color:var(--sub);margin-bottom:10px;text-align:right}
  .login-box input{width:100%;padding:14px;border-radius:10px;border:1px solid var(--border);background:var(--accent);color:var(--gold);font-family:monospace;font-size:13px;outline:none;direction:ltr;text-align:left}
  .login-box input:focus{border-color:var(--gold)}
  .btn{padding:13px 24px;border-radius:10px;border:none;cursor:pointer;font-size:.95rem;font-weight:600;font-family:inherit;width:100%;margin-top:14px}
  .btn-gold{background:var(--gold);color:#1A1A2E}
  .btn-gold:active{opacity:.8}
  .login-err{color:var(--red);font-size:.85rem;margin-top:12px;display:none}
  .login-hint{color:var(--sub);font-size:.78rem;margin-top:16px;line-height:1.6}
  .login-hint code{color:var(--gold);background:var(--accent);padding:2px 6px;border-radius:4px;direction:ltr;display:inline-block}
  #app{display:none}
  .topbar{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--card);border-bottom:1px solid var(--border)}
  .topbar .spider{font-size:1.5rem}
  .topbar h1{font-size:1.1rem;color:var(--gold)}
  .topbar .ver{font-size:.75rem;color:var(--sub);margin-right:auto}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .wrap{max-width:900px;margin:0 auto;padding:24px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
  .card h3{font-size:.75rem;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .card .val{font-size:1.4rem;font-weight:700;color:var(--gold)}
  .section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
  .section h2{font-size:1rem;margin-bottom:16px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border:none}
  .row .label{font-size:.9rem}
  .row .meta{font-size:.8rem;color:var(--sub);font-family:monospace}
  .logout{padding:8px 18px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--sub);cursor:pointer;font-family:inherit;font-size:.85rem}
</style>
</head>
<body>
<div id="login">
  <div style="text-align:center">
    <div class="spider">🕷️</div>
    <h1>CoBWeaverClaw</h1>
    <p>بوابة التحكم</p>
  </div>
  <div class="login-box">
    <label>الصق توكين البوابة هنا:</label>
    <input type="text" id="token-input" placeholder="697b6f7a98ec..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn btn-gold" onclick="doLogin()">دخول</button>
    <p class="login-err" id="login-err">توكين غير صحيح</p>
    <div class="login-hint">
      احصل على التوكين من الطرفية:<br>
      <code>python main.py gateway --url</code><br>
      انسخ الجزء بعد <code>token=</code> فقط
    </div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <span class="spider">🕷️</span>
    <h1>CoBWeaverClaw</h1>
    <span class="dot"></span>
    <span class="ver" id="ver">—</span>
    <button class="logout" onclick="doLogout()">خروج</button>
  </div>
  <div class="wrap" id="content"></div>
</div>
<script>
let TOKEN = "";
(function(){
  const m = location.hash.match(/token=([a-f0-9]+)/i);
  if (m) { TOKEN = m[1]; history.replaceState(null, "", location.pathname); tryLogin(); }
})();
function doLogin(){
  const v = document.getElementById("token-input").value.trim();
  TOKEN = v.replace(/[\s\n\r]+/g, "").replace(/^.*token=/i, "");
  tryLogin();
}
function doLogout(){
  TOKEN = "";
  document.getElementById("app").style.display = "none";
  document.getElementById("login").style.display = "flex";
  document.getElementById("token-input").value = "";
}
async function api(path){
  const r = await fetch(path + "?token=" + TOKEN);
  if (r.status === 401) throw new Error("unauthorized");
  return r.json();
}
async function tryLogin(){
  try {
    const [status, account] = await Promise.all([api("/api/status"), api("/api/account")]);
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("ver").textContent = "v" + status.version;
    render(status, account);
  } catch(e){
    const err = document.getElementById("login-err");
    if (err) err.style.display = "block";
  }
}
function render(status, account){
  document.getElementById("content").innerHTML = `
    <div class="grid">
      <div class="card"><h3>الحالة</h3><div class="val" style="color:var(--green);font-size:1.1rem">يعمل</div></div>
      <div class="card"><h3>المنصة</h3><div class="val" style="font-size:1.1rem">${status.platform}</div></div>
      <div class="card"><h3>الإصدار</h3><div class="val" style="font-size:1.1rem">${status.version}</div></div>
    </div>
    <div class="section">
      <h2>الحساب</h2>
      <div class="row"><span class="label">المعرّف</span><span class="meta">${account.account_id}</span></div>
      <div class="row"><span class="label">أُنشئ في</span><span class="meta">${(account.created_at||'').slice(0,19)}</span></div>
      <div class="row"><span class="label">الجهاز</span><span class="meta">${account.device_name||'—'}</span></div>
    </div>
    <div class="section">
      <h2>إجراءات (من الطرفية)</h2>
      <div class="row"><div><div class="label">نسخة احتياطية</div><div class="meta">python main.py backup</div></div></div>
      <div class="row"><div><div class="label">إعادة التشغيل</div><div class="meta">python main.py restart</div></div></div>
      <div class="row"><div><div class="label">توكين جديد</div><div class="meta">python main.py gateway --new-token</div></div></div>
    </div>
  `;
}
</script>
</body>
</html>
