<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- خلفية بيج دافئة مع تدرج -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%"   stop-color="#E8A882"/>
      <stop offset="100%" stop-color="#C97B52"/>
    </radialGradient>
    <!-- تدرج أبيض للعنكبوت -->
    <linearGradient id="spiderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E8E8E8" stop-opacity="0.95"/>
    </linearGradient>
    <!-- تدرج الشريحة -->
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <!-- ظل ناعم للعنكبوت -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#8B4513" flood-opacity="0.3"/>
    </filter>
    <!-- زوايا دائرية للخلفية -->
    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- الخلفية -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>

  <!-- ===== الشبكة العلوية ===== -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.85" filter="url(#softShadow)">
    <!-- الإطار الخارجي للشبكة العلوية - مثلث كبير -->
    <line x1="256" y1="60"  x2="180" y2="160"/>
    <line x1="256" y1="60"  x2="332" y2="160"/>
    <line x1="180" y1="160" x2="332" y2="160"/>

    <!-- خطوط داخلية الشبكة العلوية -->
    <line x1="256" y1="60"  x2="220" y2="130"/>
    <line x1="256" y1="60"  x2="292" y2="130"/>
    <line x1="220" y1="130" x2="292" y2="130"/>
    <line x1="256" y1="60"  x2="256" y2="160"/>

    <!-- تقاطعات الشبكة العلوية -->
    <line x1="200" y1="100" x2="312" y2="100"/>
    <line x1="210" y1="80"  x2="302" y2="80"/>

    <!-- نقاط الشبكة -->
    <circle cx="256" cy="60"  r="4" fill="white"/>
    <circle cx="180" cy="160" r="3" fill="white"/>
    <circle cx="332" cy="160" r="3" fill="white"/>
    <circle cx="220" cy="130" r="3" fill="white"/>
    <circle cx="292" cy="130" r="3" fill="white"/>
    <circle cx="200" cy="100" r="2" fill="white"/>
    <circle cx="312" cy="100" r="2" fill="white"/>

    <!-- خطوط زخرفية الشبكة العلوية -->
    <line x1="230" y1="90"  x2="225" y2="105" stroke-width="1.5"/>
    <line x1="282" y1="90"  x2="287" y2="105" stroke-width="1.5"/>
    <line x1="248" y1="115" x2="245" y2="128" stroke-width="1.5"/>
    <line x1="264" y1="115" x2="267" y2="128" stroke-width="1.5"/>
  </g>

  <!-- ===== الشبكة السفلية ===== -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.85" filter="url(#softShadow)">
    <!-- الإطار الخارجي السفلي - مثلث مقلوب -->
    <line x1="256" y1="452" x2="180" y2="355"/>
    <line x1="256" y1="452" x2="332" y2="355"/>
    <line x1="180" y1="355" x2="332" y2="355"/>

    <!-- خطوط داخلية الشبكة السفلية -->
    <line x1="256" y1="452" x2="220" y2="382"/>
    <line x1="256" y1="452" x2="292" y2="382"/>
    <line x1="220" y1="382" x2="292" y2="382"/>
    <line x1="256" y1="355" x2="256" y2="452"/>

    <!-- تقاطعات الشبكة السفلية -->
    <line x1="200" y1="412" x2="312" y2="412"/>
    <line x1="210" y1="432" x2="302" y2="432"/>

    <!-- نقاط -->
    <circle cx="256" cy="452" r="4" fill="white"/>
    <circle cx="180" cy="355" r="3" fill="white"/>
    <circle cx="332" cy="355" r="3" fill="white"/>
    <circle cx="220" cy="382" r="3" fill="white"/>
    <circle cx="292" cy="382" r="3" fill="white"/>

    <!-- زخارف -->
    <line x1="230" y1="422" x2="225" y2="408" stroke-width="1.5"/>
    <line x1="282" y1="422" x2="287" y2="408" stroke-width="1.5"/>
    <line x1="240" y1="368" x2="237" y2="380" stroke-width="1.5"/>
    <line x1="272" y1="368" x2="275" y2="380" stroke-width="1.5"/>
  </g>

  <!-- ===== أرجل العنكبوت الثمانية ===== -->
  <g stroke="white" stroke-width="3.5" fill="none"
     stroke-linecap="round" stroke-linejoin="round"
     filter="url(#softShadow)" opacity="0.95">

    <!-- الرجل العلوية اليسرى -->
    <path d="M 210 220 L 150 170 L 90 145"/>
    <!-- الرجل الوسطى العلوية اليسرى -->
    <path d="M 205 245 L 130 220 L 62 210"/>
    <!-- الرجل الوسطى السفلية اليسرى -->
    <path d="M 205 275 L 130 290 L 62 310"/>
    <!-- الرجل السفلية اليسرى -->
    <path d="M 210 300 L 150 340 L 95 370"/>

    <!-- الرجل العلوية اليمنى -->
    <path d="M 302 220 L 362 170 L 422 145"/>
    <!-- الرجل الوسطى العلوية اليمنى -->
    <path d="M 307 245 L 382 220 L 450 210"/>
    <!-- الرجل الوسطى السفلية اليمنى -->
    <path d="M 307 275 L 382 290 L 450 310"/>
    <!-- الرجل السفلية اليمنى -->
    <path d="M 302 300 L 362 340 L 417 370"/>

    <!-- مفاصل الأرجل - نقاط دائرية -->
    <circle cx="150" cy="170" r="5" fill="white" stroke="none"/>
    <circle cx="130" cy="220" r="5" fill="white" stroke="none"/>
    <circle cx="130" cy="290" r="5" fill="white" stroke="none"/>
    <circle cx="150" cy="340" r="5" fill="white" stroke="none"/>
    <circle cx="362" cy="170" r="5" fill="white" stroke="none"/>
    <circle cx="382" cy="220" r="5" fill="white" stroke="none"/>
    <circle cx="382" cy="290" r="5" fill="white" stroke="none"/>
    <circle cx="362" cy="340" r="5" fill="white" stroke="none"/>

    <!-- أطراف الأرجل -->
    <circle cx="90"  cy="145" r="4" fill="white" stroke="none"/>
    <circle cx="62"  cy="210" r="4" fill="white" stroke="none"/>
    <circle cx="62"  cy="310" r="4" fill="white" stroke="none"/>
    <circle cx="95"  cy="370" r="4" fill="white" stroke="none"/>
    <circle cx="422" cy="145" r="4" fill="white" stroke="none"/>
    <circle cx="450" cy="210" r="4" fill="white" stroke="none"/>
    <circle cx="450" cy="310" r="4" fill="white" stroke="none"/>
    <circle cx="417" cy="370" r="4" fill="white" stroke="none"/>
  </g>

  <!-- ===== خطوط دوائر إلكترونية على الأرجل ===== -->
  <g stroke="white" stroke-width="1.2" fill="none" opacity="0.6">
    <!-- خطوط صغيرة على الأرجل اليسرى -->
    <line x1="122" y1="192" x2="115" y2="186"/>
    <line x1="112" y1="230" x2="105" y2="236"/>
    <line x1="112" y1="280" x2="105" y2="274"/>
    <line x1="122" y1="322" x2="115" y2="328"/>
    <!-- خطوط صغيرة على الأرجل اليمنى -->
    <line x1="390" y1="192" x2="397" y2="186"/>
    <line x1="400" y1="230" x2="407" y2="236"/>
    <line x1="400" y1="280" x2="407" y2="274"/>
    <line x1="390" y1="322" x2="397" y2="328"/>
    <!-- نقاط دائرية صغيرة زخرفية -->
    <circle cx="115" cy="186" r="2.5" fill="white"/>
    <circle cx="105" cy="236" r="2.5" fill="white"/>
    <circle cx="105" cy="274" r="2.5" fill="white"/>
    <circle cx="115" cy="328" r="2.5" fill="white"/>
    <circle cx="397" cy="186" r="2.5" fill="white"/>
    <circle cx="407" cy="236" r="2.5" fill="white"/>
    <circle cx="407" cy="274" r="2.5" fill="white"/>
    <circle cx="397" cy="328" r="2.5" fill="white"/>
  </g>

  <!-- ===== جسم العنكبوت العلوي (بطن صغير) ===== -->
  <g filter="url(#softShadow)">
    <ellipse cx="256" cy="210" rx="52" ry="46"
             fill="url(#spiderGrad)" stroke="white" stroke-width="1.5"/>
    <!-- تفاصيل داخلية - خطوط عنكبوتية -->
    <line x1="256" y1="168" x2="256" y2="190" stroke="#C8B8A8" stroke-width="1.5"/>
    <line x1="225" y1="180" x2="245" y2="195" stroke="#C8B8A8" stroke-width="1.2"/>
    <line x1="287" y1="180" x2="267" y2="195" stroke="#C8B8A8" stroke-width="1.2"/>
    <!-- قرون العنكبوت الصغيرة -->
    <path d="M 240 170 L 235 155 L 232 148" stroke="#C8B8A8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 272 170 L 277 155 L 280 148" stroke="#C8B8A8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="232" cy="148" r="3" fill="#C8B8A8"/>
    <circle cx="280" cy="148" r="3" fill="#C8B8A8"/>
  </g>

  <!-- ===== جسم العنكبوت السفلي (بطن كبير مع دوائر) ===== -->
  <g filter="url(#softShadow)">
    <ellipse cx="256" cy="315" rx="58" ry="60"
             fill="url(#spiderGrad)" stroke="white" stroke-width="1.5"/>
    <!-- خطوط دوائر إلكترونية داخل البطن -->
    <line x1="256" y1="268" x2="256" y2="370" stroke="#B0A090" stroke-width="1.5"/>
    <line x1="256" y1="290" x2="280" y2="310" stroke="#B0A090" stroke-width="1.2"/>
    <line x1="256" y1="290" x2="232" y2="310" stroke="#B0A090" stroke-width="1.2"/>
    <line x1="256" y1="340" x2="278" y2="325" stroke="#B0A090" stroke-width="1.2"/>
    <line x1="256" y1="340" x2="234" y2="325" stroke="#B0A090" stroke-width="1.2"/>
    <!-- نقاط الدوائر الإلكترونية -->
    <circle cx="280" cy="310" r="3" fill="#B0A090"/>
    <circle cx="232" cy="310" r="3" fill="#B0A090"/>
    <circle cx="278" cy="325" r="3" fill="#B0A090"/>
    <circle cx="234" cy="325" r="3" fill="#B0A090"/>
    <circle cx="256" cy="268" r="3" fill="#B0A090"/>
    <circle cx="256" cy="370" r="3" fill="#B0A090"/>
  </g>

  <!-- ===== الشريحة AI في المنتصف ===== -->
  <g filter="url(#softShadow)">
    <!-- إطار الشريحة الخارجي -->
    <rect x="224" y="248" width="64" height="54" rx="8" ry="8"
          fill="url(#chipGrad)" stroke="#909090" stroke-width="1.5"/>
    <!-- خطوط الشريحة الداخلية -->
    <rect x="232" y="256" width="48" height="38" rx="4" ry="4"
          fill="#E0E0E0" stroke="#A0A0A0" stroke-width="1"/>
    <!-- شبكة الشريحة الداخلية -->
    <line x1="244" y1="256" x2="244" y2="294" stroke="#A0A0A0" stroke-width="0.8"/>
    <line x1="256" y1="256" x2="256" y2="294" stroke="#A0A0A0" stroke-width="0.8"/>
    <line x1="268" y1="256" x2="268" y2="294" stroke="#A0A0A0" stroke-width="0.8"/>
    <line x1="232" y1="268" x2="280" y2="268" stroke="#A0A0A0" stroke-width="0.8"/>
    <line x1="232" y1="280" x2="280" y2="280" stroke="#A0A0A0" stroke-width="0.8"/>
    <!-- دبابيس الشريحة - يمين ويسار -->
    <rect x="218" y="256" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="218" y="264" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="218" y="272" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="218" y="280" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="218" y="288" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="288" y="256" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="288" y="264" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="288" y="272" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="288" y="280" width="6" height="4" rx="1" fill="#808080"/>
    <rect x="288" y="288" width="6" height="4" rx="1" fill="#808080"/>
    <!-- نص AI -->
    <text x="256" y="280" text-anchor="middle" dominant-baseline="middle"
          font-family="Inter, Arial, sans-serif" font-size="14"
          font-weight="800" fill="#404040" letter-spacing="1">AI</text>
  </g>

  <!-- ===== الشبكة اليسرى الجانبية ===== -->
  <g stroke="white" stroke-width="1.8" fill="none" opacity="0.75">
    <line x1="62"  cy="210" x1="62" y1="210" x2="62" y2="310"/>
    <line x1="62"  y1="210" x2="90" y2="240"/>
    <line x1="62"  y1="260" x2="90" y2="260"/>
    <line x1="62"  y1="310" x2="90" y2="280"/>
    <circle cx="62" cy="260" r="2.5" fill="white"/>
  </g>

  <!-- ===== الشبكة اليمنى الجانبية ===== -->
  <g stroke="white" stroke-width="1.8" fill="none" opacity="0.75">
    <line x1="450" y1="210" x2="450" y2="310"/>
    <line x1="450" y1="210" x2="422" y2="240"/>
    <line x1="450" y1="260" x2="422" y2="260"/>
    <line x1="450" y1="310" x2="422" y2="280"/>
    <circle cx="450" cy="260" r="2.5" fill="white"/>
  </g>

  <!-- ===== نقطة ربط جسم العنكبوت ===== -->
  <circle cx="256" cy="258" r="6" fill="white" opacity="0.9"/>
</svg>